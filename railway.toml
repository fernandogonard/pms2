# Railway — Config raíz del repo
# Funciona cuando Root Directory está vacío en Railway UI
# Si Root Directory = "backend", Railway usa backend/railway.toml directamente

[build]
builder = "NIXPACKS"
buildCommand = "cd backend && npm install"

[deploy]
startCommand = "cd backend && node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
NODE_ENV = "production"
